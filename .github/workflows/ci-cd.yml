name: CI/CD

# Ce pipeline s'arrête après la publication de l'image Docker Hub.
# Il ne touche jamais à Terraform, Ansible ou minikube : le déploiement
# local est déclenché manuellement depuis la machine du développeur
# (voir docs/deploiement-local.md).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_PATH: Locatic
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/locatic

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.SOLUTION_PATH }}/**/*.csproj

      - name: Restore
        working-directory: ${{ env.SOLUTION_PATH }}
        run: dotnet restore Locatic.sln

      - name: Build
        working-directory: ${{ env.SOLUTION_PATH }}
        run: dotnet build Locatic.sln --no-restore --configuration Release

      - name: Test
        working-directory: ${{ env.SOLUTION_PATH }}
        run: >
          dotnet test Locatic.Tests/Locatic.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: ${{ env.SOLUTION_PATH }}/TestResults/test-results.trx
          if-no-files-found: warn

  lint:
    name: Lint (dotnet format)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Avis uniquement : le style n'a jamais été uniformisé sur tout
    # l'historique du projet, donc ce job ne bloque pas encore le merge.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check formatting
        working-directory: ${{ env.SOLUTION_PATH }}
        run: dotnet format Locatic.sln --verify-no-changes --severity info

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build image (not pushed)
        uses: docker/build-push-action@v7.3.0
        with:
          context: ${{ env.SOLUTION_PATH }}
          push: false
          tags: locatic:ci
          outputs: type=docker,dest=/tmp/locatic-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docker-image
          path: /tmp/locatic-image.tar
          retention-days: 1

  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/locatic-image.tar

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: locatic:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan repository for leaked secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "1"

  publish:
    name: Publish image to Docker Hub
    runs-on: ubuntu-latest
    # Ne s'exécute que sur un push (merge) réel vers main, jamais sur une PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test, docker-build, security-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: ${{ env.SOLUTION_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
