---
- name: Deploiement Locatic sur minikube
  hosts: local
  gather_facts: false

  tasks:

    - name: Charger variables locales si dispo
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/group_vars/local.yml"
      when: (playbook_dir ~ '/group_vars/local.yml') is file

    - name: Verifier kubectl
      ansible.builtin.command:
        argv: [kubectl, version, --client]
      register: kubectl_check
      changed_when: false

    - name: Verifier que minikube tourne
      ansible.builtin.command:
        argv: [minikube, status]
      register: minikube_check
      changed_when: false
      failed_when: "'Running' not in minikube_check.stdout"

    - name: Lire les outputs terraform
      ansible.builtin.command:
        argv: [terraform, output, -json]
        chdir: "{{ terraform_dir }}"
      register: terraform_outputs_raw
      changed_when: false

    - name: Parser les outputs terraform
      ansible.builtin.set_fact:
        terraform_outputs: "{{ terraform_outputs_raw.stdout | from_json }}"

    - name: Definir namespace et pvc depuis terraform
      ansible.builtin.set_fact:
        k8s_namespace: "{{ terraform_outputs.namespace.value }}"
        sqlite_pvc_name: "{{ terraform_outputs.sqlite_pvc_name.value }}"

    - name: Creer dossier rendered si pas la
      ansible.builtin.file:
        path: "{{ k8s_rendered_dir }}"
        state: directory
        mode: "0755"

    - name: Generer les manifests app depuis les templates
      ansible.builtin.template:
        src: "{{ k8s_templates_dir }}/{{ item }}"
        dest: "{{ k8s_rendered_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "0644"
      loop:
        - app-configmap.yaml.j2
        - app-deployment.yaml.j2
        - app-service.yaml.j2
        - nginx-configmap.yaml.j2
        - nginx-deployment.yaml.j2
        - nginx-service.yaml.j2

    - name: Appliquer manifests app
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ k8s_rendered_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
      loop:
        - app-configmap.yaml.j2
        - app-deployment.yaml.j2
        - app-service.yaml.j2
        - nginx-configmap.yaml.j2
        - nginx-deployment.yaml.j2
        - nginx-service.yaml.j2
      register: apply_result
      changed_when: "'unchanged' not in apply_result.stdout"

    - name: Attendre que l'app soit prete
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - deployment/locatic-app
          - -n
          - "{{ k8s_namespace }}"
          - --timeout=120s
      changed_when: false

    - name: Attendre que nginx soit pret
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - deployment/nginx
          - -n
          - "{{ k8s_namespace }}"
          - --timeout=120s
      changed_when: false

    - name: Generer les manifests monitoring
      ansible.builtin.template:
        src: "{{ k8s_monitoring_dir }}/{{ item }}"
        dest: "{{ k8s_rendered_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "0644"
      loop:
        - kube-state-metrics-rbac.yaml.j2
        - kube-state-metrics-deployment.yaml.j2
        - kube-state-metrics-service.yaml.j2
        - prometheus-configmap.yaml.j2
        - prometheus-deployment.yaml.j2
        - prometheus-service.yaml.j2
        - grafana-secret.yaml.j2
        - grafana-datasource-configmap.yaml.j2
        - grafana-dashboard-provisioning-configmap.yaml.j2
        - grafana-dashboard-configmap.yaml.j2
        - grafana-deployment.yaml.j2
        - grafana-service.yaml.j2

    - name: Appliquer manifests monitoring
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ k8s_rendered_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
      loop:
        - kube-state-metrics-rbac.yaml.j2
        - kube-state-metrics-deployment.yaml.j2
        - kube-state-metrics-service.yaml.j2
        - prometheus-configmap.yaml.j2
        - prometheus-deployment.yaml.j2
        - prometheus-service.yaml.j2
        - grafana-secret.yaml.j2
        - grafana-datasource-configmap.yaml.j2
        - grafana-dashboard-provisioning-configmap.yaml.j2
        - grafana-dashboard-configmap.yaml.j2
        - grafana-deployment.yaml.j2
        - grafana-service.yaml.j2
      register: monitoring_apply_result
      changed_when: "'unchanged' not in monitoring_apply_result.stdout"

    - name: Attendre kube-state-metrics
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - deployment/kube-state-metrics
          - -n
          - "{{ k8s_namespace }}"
          - --timeout=120s
      changed_when: false

    - name: Attendre prometheus
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - deployment/prometheus
          - -n
          - "{{ k8s_namespace }}"
          - --timeout=120s
      changed_when: false

    - name: Attendre grafana
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - deployment/grafana
          - -n
          - "{{ k8s_namespace }}"
          - --timeout=120s
      changed_when: false

    - name: IP minikube
      ansible.builtin.command:
        argv: [minikube, ip]
      register: minikube_ip
      changed_when: false

    - name: NodePort nginx
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - svc
          - nginx
          - -n
          - "{{ k8s_namespace }}"
          - -o
          - jsonpath={.spec.ports[0].nodePort}
      register: nginx_nodeport
      changed_when: false

    - name: NodePort prometheus
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - svc
          - prometheus
          - -n
          - "{{ k8s_namespace }}"
          - -o
          - jsonpath={.spec.ports[0].nodePort}
      register: prometheus_nodeport
      changed_when: false

    - name: NodePort grafana
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - svc
          - grafana
          - -n
          - "{{ k8s_namespace }}"
          - -o
          - jsonpath={.spec.ports[0].nodePort}
      register: grafana_nodeport
      changed_when: false

    - name: Afficher les URLs
      ansible.builtin.debug:
        msg:
          - "App via Nginx : http://{{ minikube_ip.stdout }}:{{ nginx_nodeport.stdout }}"
          - "Prometheus : http://{{ minikube_ip.stdout }}:{{ prometheus_nodeport.stdout }}"
          - "Grafana : http://{{ minikube_ip.stdout }}:{{ grafana_nodeport.stdout }} (admin / {{ grafana_admin_password }})"
