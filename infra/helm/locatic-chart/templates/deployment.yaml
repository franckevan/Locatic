apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "locatic.fullname" . }}
  labels:
    {{- include "locatic.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "locatic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "locatic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
      {{- if .Values.monitoring.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.monitoring.scrapePath | quote }}
        prometheus.io/port: {{ .Values.monitoring.scrapePort | quote }}
      {{- end }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ include "locatic.fullname" . }}-config
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.sqlite.mountPath }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.config.containerPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.config.containerPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Values.sqlite.existingClaim }}
