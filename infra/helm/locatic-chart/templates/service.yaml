apiVersion: v1
kind: Service
metadata:
  name: {{ include "locatic.fullname" . }}-svc
  labels:
    {{- include "locatic.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  # ClusterIP volontairement : l'application n'est jamais exposée directement,
  # seul Nginx (templates/nginx-service.yaml) est le point d'entrée utilisateur.
  type: ClusterIP
  selector:
    {{- include "locatic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
